name: Furrhythm
options:
  bundleIdPrefix: com.shimondeitel.estrusdiary
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Furrhythm:
    type: application
    platform: iOS
    sources:
      - path: Furrhythm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.estrusdiary
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Furrhythm/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FurrhythmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FurrhythmTests
      - path: Furrhythm.storekit
    dependencies:
      - target: Furrhythm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.estrusdiary.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FurrhythmUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FurrhythmUITests
    dependencies:
      - target: Furrhythm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.estrusdiary.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Furrhythm:
    build:
      targets:
        Furrhythm: all
        FurrhythmTests: [test]
        FurrhythmUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Furrhythm.storekit
    test:
      config: Debug
      storeKitConfiguration: Furrhythm.storekit
      targets:
        - FurrhythmTests
        - FurrhythmUITests
    archive:
      config: Release
